# プレフィックスキーをctrl+aに変更
set -g prefix C-a

# デフォルトのプレフィックスキーctrl+bを解除
unbind C-b

# プレフィックスキー+^でペインを垂直分割する
bind ^ split-window -h

# プレフィックスキー+-でペインを水平分割する
bind - split-window -v

# 256色モードを有効化
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# ステータスラインの文字色、背景色を変更
# setw -g status-style fg=colour255,bg=colour234

# マウス操作を有効化
set-option -g mouse on

# ===== Monokai Theme =====

# ステータスバー全体
set -g status-style "fg=#F8F8F2,bg=#272822"
set -g status-interval 1

# ステータスバー左側（セッション名）
set -g status-left-length 30
set -g status-left "#[fg=#272822,bg=#A6E22E,bold] #S #[fg=#A6E22E,bg=#272822]"

# ステータスバー右側（日時）
set -g status-right-length 50
set -g status-right "#[fg=#66D9EF]%H:%M:%S #[fg=#F8F8F2]| #[fg=#E6DB74]%Y-%m-%d "

# ウィンドウリスト（非アクティブ）
setw -g window-status-format "#[fg=#75715E] #I:#W "

# ウィンドウリスト（アクティブ）
setw -g window-status-current-format "#[fg=#272822,bg=#FD971F,bold] #I:#W #[default]"

# ペインボーダー
set -g pane-border-style "fg=#75715E"
set -g pane-active-border-style "fg=#A6E22E"

# メッセージ
set -g message-style "fg=#272822,bg=#E6DB74,bold"
set -g message-command-style "fg=#F8F8F2,bg=#272822"

# コピーモードのハイライト
setw -g mode-style "fg=#272822,bg=#FD971F"

# ===== Keybinding Hints (Zellij風) =====
set -g status 2
set -g status-format[1] "#[align=centre,fg=#75715E,bg=#1E1F1C]#[fg=#FD971F,bold]C-a ^#[fg=#75715E,nobold] Split-H #[fg=#75715E]│ #[fg=#FD971F,bold]C-a -#[fg=#75715E,nobold] Split-V #[fg=#75715E]│ #[fg=#FD971F,bold]C-a c#[fg=#75715E,nobold] New #[fg=#75715E]│ #[fg=#FD971F,bold]C-a n#[fg=#75715E,nobold] Next #[fg=#75715E]│ #[fg=#FD971F,bold]C-a p#[fg=#75715E,nobold] Prev #[fg=#75715E]│ #[fg=#FD971F,bold]C-a d#[fg=#75715E,nobold] Detach #[fg=#75715E]│ #[fg=#FD971F,bold]C-a z#[fg=#75715E,nobold] Zoom #[fg=#75715E]│ #[fg=#FD971F,bold]C-a [#[fg=#75715E,nobold] Copy"
